<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stars OS</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1a0f35;
      --secondary: #2d1b4e;
      --accent: #d4a5ff;
      --accent-dark: #9d6cff;
      --text-primary: #f5f0ff;
      --text-secondary: #c8b5e0;
      --text-muted: #7a6b99;
      --border: rgba(212, 165, 255, 0.15);
      --bg-hover: rgba(212, 165, 255, 0.08);
      --glow: rgba(212, 165, 255, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(135deg, #1a0f35 0%, #0d0620 100%);
      color: var(--text-primary);
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(212, 165, 255, 0.05);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 4px;
    }

    /* LAYOUT */
    #desk {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      height: 60px;
      background: rgba(26, 15, 53, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 2rem;
      gap: 2rem;
      flex-shrink: 0;
    }

    .logo {
      font-size: 1.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), #c4a1ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .search {
      flex: 1;
      display: flex;
      align-items: center;
      background: rgba(212, 165, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.6rem 1rem;
      max-width: 300px;
    }

    .search input {
      background: none;
      border: none;
      outline: none;
      color: var(--text-primary);
      width: 100%;
      font-size: 0.9rem;
    }

    .search input::placeholder {
      color: var(--text-muted);
    }

    .header-buttons {
      display: flex;
      gap: 0.8rem;
    }

    .header-btn {
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-primary);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }

    .header-btn:hover {
      background: var(--bg-hover);
      border-color: var(--accent);
    }

    .header-btn.active {
      background: var(--accent);
      color: #1a0f35;
      border: none;
    }

    /* MAIN */
    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* SIDEBAR */
    aside {
      width: 200px;
      background: rgba(26, 15, 53, 0.5);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 1.5rem 1rem;
    }

    .sidebar-section {
      margin-bottom: 2rem;
    }

    .sidebar-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.8rem;
    }

    .sidebar-link {
      display: block;
      padding: 0.7rem 0.8rem;
      border-radius: 8px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }

    .sidebar-link:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .sidebar-link.active {
      background: rgba(212, 165, 255, 0.1);
      color: var(--accent);
      border-color: var(--accent);
    }

    /* CONTENT */
    #content {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1.5rem;
    }

    .game-card {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1px solid var(--border);
      background: rgba(212, 165, 255, 0.05);
      aspect-ratio: 1 / 1.2;
      display: flex;
      flex-direction: column;
    }

    .game-thumb {
      flex: 1;
      background: linear-gradient(135deg, rgba(212, 165, 255, 0.1), rgba(196, 161, 255, 0.1));
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      font-size: 3rem;
    }

    .play-btn {
      position: absolute;
      font-size: 3.5rem;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
    }

    .game-card:hover .play-btn {
      opacity: 1;
      transform: scale(1.1);
    }

    .game-card:hover .game-thumb {
      background: linear-gradient(135deg, rgba(212, 165, 255, 0.2), rgba(196, 161, 255, 0.2));
    }

    .game-info {
      padding: 1rem;
      background: rgba(0, 0, 0, 0.3);
      border-top: 1px solid var(--border);
    }

    .game-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.3rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .game-category {
      font-size: 0.7rem;
      color: var(--accent);
      font-weight: 600;
    }

    /* MODAL */
    #gameModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    #gameModal.open {
      display: flex;
    }

    .modal-content {
      background: rgba(26, 15, 53, 0.95);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 90%;
      height: 90%;
      max-width: 1200px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .modal-title {
      font-size: 1.3rem;
      font-weight: 700;
    }

    .modal-close {
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-size: 1.5rem;
      cursor: pointer;
    }

    .modal-body {
      flex: 1;
      overflow: hidden;
    }

    #gameFrame {
      width: 100%;
      height: 100%;
      border: none;
      background: #000;
    }

    /* CLOAKER */
    .cloaker-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 0.8rem 1.5rem;
      background: var(--accent);
      color: #1a0f35;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.9rem;
      z-index: 999;
    }

    .cloaker-btn:hover {
      opacity: 0.9;
    }

    /* CLOAKER CLASSROOM MODE */
    body.cloaker-classroom {
      background: #fff !important;
    }

    body.cloaker-classroom header {
      background: #fff !important;
      border-bottom: 1px solid #ddd !important;
    }

    body.cloaker-classroom .logo {
      color: #1a0f35 !important;
      -webkit-text-fill-color: #1a0f35 !important;
      background: none !important;
    }

    body.cloaker-classroom aside {
      background: #f8f9fa !important;
      border-right: 1px solid #ddd !important;
    }

    body.cloaker-classroom .sidebar-title,
    body.cloaker-classroom .sidebar-link,
    body.cloaker-classroom .header-btn {
      color: #202124 !important;
    }

    body.cloaker-classroom #content {
      background: #fff !important;
    }

    body.cloaker-classroom .game-card {
      background: #f8f9fa !important;
      border: 1px solid #ddd !important;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      aside {
        display: none;
      }

      .games-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 1rem;
      }

      header {
        flex-wrap: wrap;
      }

      .search {
        order: 3;
        flex-basis: 100%;
        margin-top: 0.5rem;
      }
    }
  </style>
</head>
<body>

<div id="desk">
  <header>
    <div class="logo">✦ Stars OS</div>
    <div class="search">
      <input type="text" id="searchInput" placeholder="Search games...">
    </div>
    <div class="header-buttons">
      <button class="header-btn active" onclick="filterGames('all')">All</button>
      <button class="header-btn" onclick="filterGames('action')">Action</button>
      <button class="header-btn" onclick="filterGames('sports')">Sports</button>
      <button class="header-btn" onclick="filterGames('puzzle')">Puzzle</button>
    </div>
  </header>

  <div id="main">
    <aside>
      <div class="sidebar-section">
        <div class="sidebar-title">Library</div>
        <div class="sidebar-link active" onclick="filterGames('all')">📚 All Games</div>
        <div class="sidebar-link" onclick="filterGames('action')">💥 Action</div>
        <div class="sidebar-link" onclick="filterGames('sports')">🏆 Sports</div>
        <div class="sidebar-link" onclick="filterGames('puzzle')">🧩 Puzzle</div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">Quick Play</div>
        <div class="sidebar-link" onclick="openGame('https://slope-unblocked-10x.github.io/action-games/slope/', 'Slope', '🎿')">Slope</div>
        <div class="sidebar-link" onclick="openGame('https://g.w3technic.com/games/retro-bowl/', 'Retro Bowl', '🏈')">Retro Bowl</div>
      </div>
    </aside>

    <div id="content">
      <div class="games-grid" id="gamesGrid"></div>
    </div>
  </div>
</div>

<!-- GAME MODAL -->
<div id="gameModal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Game</div>
      <button class="modal-close" onclick="closeGame()">✕</button>

    <div class="modal-body">
      <iframe id="gameFrame"></iframe>

  </div>
</div>

    {t:'A Dark Room', u:'https://script.google.com/macros/s/AKfycbxqlNh5IduglPReEuRaIb3wIobpempUhx55p4uUX8ZConj9hL2jDemjPT4Yo8TfIANd/exec', e:'🕯️', cat:'adventure'},

    {t:'Air Hockey Cup', u:'https://script.google.com/macros/s/AKfycbw7VnhYKWITlJo9p8qyT8ExOfvnjvizq57_jj7MzDnyJWTuHtNbee3NHoEoRhuS6eqo/exec', e:'🏑', cat:'sports'},

    {t:'Age of Defense', u:'https://script.google.com/macros/s/AKfycbzk5XThcxe-JcfgFLDj0pC-gne_3x-RD4Vl-0mdfaoie7KIFK6BVN40YDAco81kRwmRGg/exec', e:'🛡️', cat:'action'},
    {t:'2048 Shoot', u:'https://script.google.com/macros/s/AKfycbw83uxYRr534DXrzIHS5T6Q5AeQtQnMdkk8Dxxo3i732YYOm6pr6LqO730wHogB7sI/exec', e:'🎯', cat:'puzzle'},
    {t:'3 Pandas 2 Night', u:'https://script.google.com/macros/s/AKfycbw6oTknzPj4n1yIKixw9uxxP3042RdoXTCp61Pg6duI5oa6PNamciA6vtw0ke4-Izk5uA/exec', e:'🌑', cat:'adventure'},
    {t:'Achievement Unlocked', u:'https://script.google.com/macros/s/AKfycbxEsaH5mWuWswPik3nCGEuPyk0b0tZ4hNsOoskqufxNRs-CIXGc5FFo5ORQAQu-ERgEJA/exec', e:'🏅', cat:'puzzle'},
  ];

  let currentFilter = 'all';

  function renderGames() {
    const grid = document.getElementById('gamesGrid');
    const filtered = currentFilter === 'all' ? GAMES : GAMES.filter(g => g.cat === currentFilter);
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    const results = filtered.filter(g => g.t.toLowerCase().includes(searchTerm));
    
    grid.innerHTML = results.map(game => `
      <div class="game-card" onclick="openGame('${game.u.replace(/'/g, "\\'")}', '${game.t}', '${game.e}')">
        <div class="game-thumb">
          <span style="font-size:2.5rem;">${game.e}</span>
          <div class="play-btn">▶</div>
        </div>
        <div class="game-info">
          <div class="game-title">${game.t}</div>
          <div class="game-category">${game.cat.toUpperCase()}</div>
        </div>
      </div>
    `).join('');
  }

  function filterGames(cat) {
    currentFilter = cat;
    document.querySelectorAll('.header-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    renderGames();
  }

  function openGame(url, title, emoji) {
    document.getElementById('modalTitle').textContent = `${emoji} ${title}`;
    document.getElementById('gameFrame').src = url;
    document.getElementById('gameModal').classList.add('open');
  }

  function closeGame() {
    document.getElementById('gameModal').classList.remove('open');
    document.getElementById('gameFrame').src = '';
  }

  function toggleCloaker() {
    document.body.classList.toggle('cloaker-classroom');
    document.querySelector('.cloaker-btn').textContent = document.body.classList.contains('cloaker-classroom') ? '👓 Normal' : '🎭 Cloaker';
  }

  document.getElementById('searchInput').addEventListener('input', renderGames);
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeGame();
  });

  renderGames();
</script>
